<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Checkout</title>
     <style>
    .error-message { font-size: 0.9em; margin-top: 0.25rem; display: block; }
  </style>

  </head>
<body>
  <div class="container p-5">
    <h2>Checkout</h2>
    <form id="checkout-form" novalidate>
      <label class="form-label">Name</label>
      <input type="text" id="name" class="form-control" />
      <br />

      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="name@example.com" />
      <br />

      <label class="form-label">Phone</label>
      <input type="text" id="phone" class="form-control" placeholder="070-000 00 00" />
      <br />

      <label class="form-label">Street address</label>
      <input type="text" id="address" class="form-control" />
      <br />

      <label class="form-label">Postal code</label>
      <input type="text" id="postal" class="form-control" placeholder="12345" />
      <br />

      <label class="form-label">City</label>
      <input type="text" id="city" class="form-control" />
      <br />

      <button type="submit" class="btn btn-primary my-btn">Submit Order</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("checkout-form");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let valid = true;

      document.querySelectorAll(".error-message").forEach(el => el.remove());

      function showError(input, message) {
        const error = document.createElement("small");
        error.className = "text-danger error-message";
        error.innerText = message;
        input.classList.add("is-invalid");
        input.parentNode.appendChild(error);
      }

      const name = document.getElementById("name");
      const email = document.getElementById("email");
      const phone = document.getElementById("phone");
      const address = document.getElementById("address");
      const postal = document.getElementById("postal");
      const city = document.getElementById("city");

      [name, email, phone, address, postal, city].forEach(input => input.classList.remove("is-invalid"));

      if (name.value.trim().length < 2 || name.value.trim().length > 50) {
        showError(name, "Name must be between 2 and 50 characters");
        valid = false;
      }

      if (!email.value.includes("@") || email.value.length > 50) {
        showError(email, "Enter a valid email (max 50 chars)");
        valid = false;
      }

      if (!/^[0-9\-\(\)\s]+$/.test(phone.value) || phone.value.length > 20) {
        showError(phone, "Phone can contain numbers, -, (), max 20 chars");
        valid = false;
      }

      if (address.value.trim().length < 2 || address.value.trim().length > 50) {
        showError(address, "Address must be between 2 and 50 characters");
        valid = false;
      }

      if (!/^[0-9]{5}$/.test(postal.value)) {
        showError(postal, "Postal code must be exactly 5 digits");
        valid = false;
      }

      if (city.value.trim().length < 2 || city.value.trim().length > 20) {
        showError(city, "City must be between 2 and 20 characters");
        valid = false;
      }

      if (valid) {
        alert("Order placed successfully!");
        form.reset();
      }
    });
  </script>
</html>
