<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div>
        <nav class="navbar navbar-expand-sm custom-navbar fixed-top">
          <div class="container-fluid">
            <a class="navbar-brand" href="#">OUR WEBSHOP</a>

            <div class="collapse navbar-collapse">
              <ul class="navbar-nav ms-3">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item dropdown">
                  <a
                    class="nav-link dropdown-toggle"
                    href="#"
                    role="button"
                    data-bs-toggle="dropdown"
                  >
                    Products
                  </a>
                  <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item active" href="product-page.html"
                      >All Products</a
                    >
                  </li>
                  <li><a class="dropdown-item" href="beauty-product-page.html">Beauty</a></li>
                  <li><a class="dropdown-item" href="fragrances-product-page.html">Fragrances</a></li>
                  <li><a class="dropdown-item" href="grocery-produkt-page.html">Grocery</a></li>
                  <li><a class="dropdown-item" href="furniture-product-page.html">Furniture</a></li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="contact-us.html">Contact</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="about-us.html">About</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <section id="Products" class="container p-5">
      <h2 id="Page-headline" class="text-center">Groceries</h2>
      <br />
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 gy-4" id="product-grid">

       
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
  fetch('https://dummyjson.com/products')
  //fetch('products.json')
    .then(response => response.json())
    .then(data => {
      const grid = document.getElementById('product-grid');

      data.products.forEach(product => {
        if(product.category === 'groceries') {
        grid.innerHTML += `
          <div class="col">
            <a href="product.html?id=${product.id}" style="text-decoration:none; color:inherit;">
            <div class="card h-100">
                <img
                src="${product.thumbnail}"
                alt="${product.title}"
                style="width: 100%; height: 150px; object-fit: contain;"
                class="card-img-top p-2"
              />
              <div class="card-body">
                <h5 class="card-title">${product.title}</h5>
                <p class="card-text text-muted small">${product.description}</p>
                <span>€${product.price}</span>
              </div>
              
            </div>
            </a>
          </div>`;
        }
      });
    });
</script>
  </body>
</html>
