<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Product</title>
  </head>

  <body>
    <div id="Products" class="container p-5">
      <div class="row align-items-center">
       
        <div class="col-md-6">
          <img id="product-image" class="img-fluid" alt="Product image">
        </div>

        <div class="col-md-6">
          <h2 id="product-title">Product Name</h2>
          <p id="product-description">info om produkten</p>
          <h4 id="product-price">€2.50</h4>

          <a href="checkout.html" class="btn my-btn">Buy</a>
        </div>
      </div>
    </div>

     <script>
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("id");

      fetch(`https://dummyjson.com/products/${productId}`)
        .then(res => res.json())
        .then(product => {

          document.getElementById("product-title").innerText = product.title;
          document.getElementById("product-description").innerText = product.description;
          document.getElementById("product-price").innerText = `€${product.price}`;
          document.getElementById("product-image").src = product.thumbnail;

        });

          document.getElementById("product-image").src = product.thumbnail;
        }
      });
    });
    */
    </script>
  </body>
</html>
